<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ===== PAGE FADE IN ===== */
body {
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;

  opacity: 0;
  animation: pageFadeIn 0.8s ease forwards;
}

@keyframes pageFadeIn {
  to { opacity: 1; }
}

/* ===== BACKGROUND ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,215,0,0.12), transparent 55%),
    radial-gradient(circle at 20% 80%, rgba(255,180,0,0.08), transparent 60%);
  z-index: -1;
}

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 18px 24px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,215,0,0.12);
  z-index: 1000;
}

.navbar h2 {
  color: #ffd700;
  letter-spacing: 1px;
}

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 120px 20px 80px;
  position: relative;
}

/* glowing ring behind logo */
.logo-wrapper {
  position: relative;
  display: inline-block;
}

.logo-wrapper::before {
  content: "";
  position: absolute;
  inset: -28px;
  border-radius: 50%;
  border: 2px solid rgba(255,215,0,0.25);
  animation: spin 8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* logo animation */
.hero img {
  width: 240px;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.35));
  animation: float 3s ease-in-out infinite, glow 2.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 15px rgba(255,215,0,0.4)); }
  50% { filter: drop-shadow(0 0 40px rgba(255,215,0,0.9)); }
}

/* hero text */
.hero h1 {
  margin-top: 20px;
  font-size: 44px;
  color: #ffd700;
  animation: fadeUp 0.8s ease forwards;
}

.hero p {
  margin-top: 10px;
  color: #cfcfcf;
  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== BUTTON ===== */
.btn {
  margin-top: 25px;
  display: inline-block;
  padding: 12px 26px;
  border: 1px solid #ffd700;
  color: #ffd700;
  text-decoration: none;
  transition: 0.2s;
  animation: btnGlow 2.5s infinite;
}

.btn:hover {
  background: #ffd700;
  color: black;
  transform: scale(1.05);
}

@keyframes btnGlow {
  0%,100% { box-shadow: 0 0 0 rgba(255,215,0,0); }
  50% { box-shadow: 0 0 20px rgba(255,215,0,0.35); }
}

/* ===== SECTIONS ===== */
.section {
  max-width: 900px;
  margin: auto;
  padding: 70px 20px;
}

.section h2 {
  text-align: center;
  color: #ffd700;
  margin-bottom: 25px;
}

/* cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,215,0,0.12);
  padding: 18px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(255,215,0,0.4);
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.overlay-content {
  background: #111;
  padding: 24px;
  border-radius: 12px;
  border: 1px solid rgba(255,215,0,0.2);
  text-align: center;
  width: 90%;
  max-width: 350px;
}

.overlay-content h2 {
  color: #ffd700;
}

.overlay-content p {
  color: #ccc;
  margin-top: 10px;
}

.close-btn {
  margin-top: 15px;
  padding: 10px 14px;
  border: none;
  background: #ffd700;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>OLYMPUS LEAGUE</h2>
</div>

<!-- HERO -->
<div class="hero">
  <div class="logo-wrapper">
    <img src="logo.png">
  </div>

  <h1>Olympus League</h1>
  <p>Tier 3 Competitive Rainbow Six Siege</p>

  <a class="btn" href="https://discord.gg/Butq7VhNx">Join Discord</a>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>ABOUT</h2>
  <div class="cards">
    <div class="card" onclick="openOverlay('Competition','Structured Tier 3 competitive environment.')">
      Competitive Play
    </div>

    <div class="card" onclick="openOverlay('Growth','Helping players improve and get noticed.')">
      Player Growth
    </div>

    <div class="card" onclick="openOverlay('Exposure','Streamed matches and recognition.')">
      Exposure
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 id="title"></h2>
    <p id="text"></p>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
function openOverlay(t, x){
  document.getElementById("title").innerText = t;
  document.getElementById("text").innerText = x;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay(){
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
