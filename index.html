<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, #ffd70022, transparent 60%),
              radial-gradient(circle, #ffb70022, transparent 60%),
              #0a0a0a;
  animation: moveBg 15s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(10%, 10%); }
  100% { transform: translate(0,0); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(12px);
  background: rgba(20, 15, 0, 0.6);
  border-bottom: 1px solid rgba(255,215,0,0.2);
}

.menu-toggle {
  display: block;
  font-size: 24px;
  cursor: pointer;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 10px;
  background: rgba(30, 20, 0, 0.95);
  flex-direction: column;
  width: 220px;
  display: none;
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

.nav-links a {
  color: #ffd700;
  text-decoration: none;
  padding: 12px;
}

.nav-links.active { display: flex; }

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero img {
  width: 260px; /* 🔥 BIGGER LOGO */
  filter: drop-shadow(0 0 25px gold);
}

.hero h2 {
  font-size: 42px;
  color: #ffd700;
}

/* SECTIONS */
.section { padding: 40px 20px; }

.section h2 { color: #ffd700; }

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(20, 15, 0, 0.8);
  padding: 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid rgba(255,215,0,0.2);
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
}

/* BUTTON */
.join-btn {
  border: 2px solid #ffd700;
  color: #ffd700;
  padding: 12px 25px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
}

.join-btn:hover {
  background: #ffd700;
  color: black;
}

/* OVERLAY BACKDROP */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(12px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  animation: fadeIn 0.3s ease;
}

/* SMOOTH GLASS MODAL */
.overlay-content {
  background: linear-gradient(145deg, rgba(30,20,0,0.85), rgba(10,10,10,0.9));
  backdrop-filter: blur(20px);

  padding: 28px;
  border-radius: 22px;
  width: 85%;
  max-width: 340px;

  text-align: center;

  border: 1px solid rgba(255,215,0,0.25);

  box-shadow: 
    0 0 30px rgba(255,215,0,0.25),
    inset 0 0 20px rgba(255,215,0,0.05);

  animation: scaleIn 0.25s ease;
}

/* TITLE */
.overlay-content h2 {
  color: #ffd700;
  margin-bottom: 10px;
}

/* TEXT */
.overlay-content p {
  color: #ccc;
  line-height: 1.4;
}

/* BUTTON */
.close-btn {
  margin-top: 18px;
  padding: 10px 16px;
  border: none;
  background: linear-gradient(135deg, #ffd700, #ffb700);
  color: black;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.25s;
}

.close-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px gold;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scaleIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Olympus League</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="#">Hall of Fame</a>
    <a href="#">Schedule/Results</a>
    <a href="#">Teams</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Olympus</h2>
  <div class="cards">
    <div class="card" onclick="openOverlay('Competition','Olympus is a high-level Tier 3 Rainbow Six Siege league focused on structured play, serious teams, and competitive integrity.')">
      Top Tier 3 Competition
    </div>

    <div class="card" onclick="openOverlay('Structure','Weekly matches, BO3 formats, and organized seasons with playoffs and finals ensure a real competitive environment.')">
      Organized Leagues & Seasons
    </div>

    <div class="card" onclick="openOverlay('Exposure','Players gain recognition through streamed matches, stats tracking, and highlight opportunities.')">
      Exposure for Upcoming Talent
    </div>
  </div>
</div>

<!-- JOIN -->
<div class="section">
  <h2>Join Olympus</h2>
  <a href="https://discord.gg/GtKHY3dr3" class="join-btn" target="_blank">
    Join Here
  </a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

function openOverlay(title, text) {
  document.getElementById("overlayTitle").innerText = title;
  document.getElementById("overlayText").innerText = text;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
