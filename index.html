<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,215,0,0.12), transparent 35%),
    radial-gradient(circle at 85% 30%, rgba(255,180,0,0.10), transparent 40%),
    radial-gradient(circle at 50% 85%, rgba(255,215,0,0.08), transparent 45%);
  filter: blur(20px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,215,0,0.15);
}

.navbar h2 { color: #ffd700; }

.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(15,15,15,0.95);
  border-radius: 14px;
  display: none;
  flex-direction: column;
}

.nav-links.active { display: flex; }

.nav-links a {
  padding: 12px;
  color: #ffd700;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px;
}

.hero img {
  width: 280px;
  filter: drop-shadow(0 0 30px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s infinite;
}

@keyframes float {
  50% { transform: translateY(-10px); }
}

@keyframes glow {
  50% { filter: drop-shadow(0 0 45px gold); }
}

.hero h2 {
  font-size: 44px;
  color: #ffd700;
}

.hero p {
  color: #bbb;
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  max-width: 1100px;
  margin: auto;
}

.section h2 {
  text-align: center;
  color: #ffd700;
  margin-bottom: 25px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(20,20,20,0.7);
  border: 1px solid rgba(255,215,0,0.15);
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
}

/* MATCH */
.featured {
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.25);
  padding: 20px;
  border-radius: 16px;
  text-align: center;
}

/* LEADERBOARD */
.leaderboard {
  background: rgba(20,20,20,0.6);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255,215,0,0.2);
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,215,0,0.08);
}

.row:hover {
  background: rgba(255,215,0,0.05);
}

.rank { color: #ffd700; width: 30px; }
.team { flex: 1; }
.points { color: #ccc; }

/* BUTTON */
.join-btn {
  display: inline-block;
  padding: 14px 30px;
  border: 2px solid #ffd700;
  color: #ffd700;
  border-radius: 12px;
  text-decoration: none;
}

.join-btn:hover {
  background: #ffd700;
  color: black;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
}

.overlay-content {
  background: rgba(20,20,20,0.95);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,215,0,0.25);
  width: 90%;
  max-width: 380px;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>OLYMPUS</h2>
</div>

<div class="hero">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<!-- MATCH OF WEEK -->
<div class="section">
  <h2>Match of the Week</h2>
  <div class="featured">
    Phantom vs Eclipse — Sunday 8PM EST
  </div>
</div>

<!-- LEADERBOARD -->
<div class="section">
  <h2>Standings</h2>
  <div class="leaderboard" id="leaderboard"></div>
</div>

<!-- SCRIPTS -->
<script>
/* =======================
   TEAMS (AUTO STANDINGS)
======================= */
const teams = {
  "Phantom": 0,
  "Eclipse": 0,
  "Nova": 0,
  "Titan": 0
};

/* =======================
   MATCHES (EDIT THIS)
======================= */
const matches = [
  { teamA: "Phantom", teamB: "Eclipse", winner: "Phantom", status: "played" },
  { teamA: "Nova", teamB: "Titan", winner: "Nova", status: "played" },
  { teamA: "Phantom", teamB: "Nova", winner: "Nova", status: "played" },
];

/* =======================
   CALCULATE STANDINGS
======================= */
function calculateStandings() {

  // reset
  for (let t in teams) teams[t] = 0;

  matches.forEach(m => {
    if (m.status === "played") {
      teams[m.winner] += 3; // win = 3 points
    }
  });

  renderLeaderboard();
}

/* =======================
   RENDER LEADERBOARD
======================= */
function renderLeaderboard() {
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  const sorted = Object.entries(teams)
    .sort((a,b) => b[1] - a[1]);

  sorted.forEach((t, i) => {
    board.innerHTML += `
      <div class="row">
        <div class="rank">${i+1}</div>
        <div class="team">${t[0]}</div>
        <div class="points">${t[1]} pts</div>
      </div>
    `;
  });
}

calculateStandings();
</script>

</body>
</html>
