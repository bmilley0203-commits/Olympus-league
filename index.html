<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: white;
  overflow-x: hidden;
  opacity: 0;
  animation: pageIn 1.2s ease forwards;
}

@keyframes pageIn {
  to { opacity: 1; }
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,170,0,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,215,0,0.08), transparent 50%);
  filter: blur(22px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,215,0,0.22);
  z-index: 9999;
}

/* OLYMPUS GOLD SWEEP INTRO */
.navbar h2 {
  font-size: 22px;
  letter-spacing: 5px;
  font-weight: 900;
  text-transform: uppercase;
  position: relative;
  display: inline-block;

  background: linear-gradient(
    90deg,
    #b8860b,
    #ffd700,
    #fff2a6,
    #ffd700,
    #b8860b
  );
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: goldShine 4s linear infinite, goldIntro 1.2s ease forwards;
  opacity: 0;
}

@keyframes goldShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

@keyframes goldIntro {
  0% { opacity: 0; transform: translateY(-10px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* NAV LINKS */
.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(15,15,15,0.95);
  border-radius: 14px;
  display: none;
  flex-direction: column;
}

.nav-links.active { display: flex; }

.nav-links a {
  padding: 12px;
  color: #ffd700;
  text-decoration: none;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(25px);
  animation: fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 90px;
}

.hero img {
  width: 280px;
  filter: drop-shadow(0 0 30px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s infinite;
}

/* STANDINGS UPGRADE (NEW) */
.leaderboard {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.65));
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid rgba(255,215,0,0.25);
  box-shadow: 0 0 40px rgba(255,215,0,0.08);
}

/* row becomes card-like */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,215,0,0.08);
  transition: 0.25s ease;
  position: relative;
}

/* hover lift */
.row:hover {
  background: rgba(255,215,0,0.08);
  transform: scale(1.02);
}

/* gold rank badge (NEW) */
.rank {
  color: black;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-radius: 50%;
  background: radial-gradient(circle, #ffd700, #b8860b);
  box-shadow: 0 0 12px rgba(255,215,0,0.4);
}

/* team emphasis */
.team {
  flex: 1;
  padding-left: 12px;
  font-weight: bold;
  letter-spacing: 0.5px;
}

/* points pill */
.points {
  color: #ffd700;
  background: rgba(255,215,0,0.08);
  padding: 6px 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,215,0,0.2);
}

/* OVERLAY STANDINGS (NEW IMPROVED LOOK) */
.overlay-row {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.15);
  transition: 0.2s;
}

.overlay-row:hover {
  transform: scale(1.02);
  background: rgba(255,215,0,0.12);
}
</style>
</head>

<body>

<div class="navbar fade delay-1">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="#">Schedule</a>
    <a href="#">Teams</a>
  </div>
</div>

<div class="hero fade delay-1">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<div class="section fade delay-2">
  <h2>Match of the Week</h2>
  <div class="featured-box">Phantom vs Eclipse — Sunday 8PM EST</div>
</div>

<div class="section fade delay-2">
  <h2>Player of the Week</h2>
  <div class="featured-box">AceStorm — 38 Kills MVP Performance</div>
</div>

<div class="section fade delay-3">
  <h2>Standings</h2>
  <div class="leaderboard" id="leaderboard"></div>
  <div style="text-align:center;">
    <button class="show-btn" onclick="openBoard()">Show Full Standings</button>
  </div>
</div>

<div class="section fade delay-4" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="https://discord.gg/2xsKgrESJ">Join Discord</a>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 style="color:#ffd700;">Full Standings</h2>
    <div id="fullBoard"></div>
    <button class="close-btn" onclick="closeBoard()">Close</button>
  </div>
</div>

<script>
const teams = {
  Phantom: 12,
  Eclipse: 10,
  Nova: 9,
  Titan: 8,
  Orion: 7,
  Vortex: 6,
  Apex: 5,
  Zenith: 4,
  Hydra: 3,
  Ghost: 2,
  Ember: 1,
  Surge: 0
};

function renderTop4() {
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";
  Object.entries(teams)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,4)
    .forEach((t,i)=>{
      board.innerHTML += `
        <div class="row">
          <div class="rank">${i+1}</div>
          <div class="team">${t[0]}</div>
          <div class="points">${t[1]} pts</div>
        </div>
      `;
    });
}

function openBoard() {
  const full = document.getElementById("fullBoard");
  full.innerHTML = "";
  Object.entries(teams)
    .sort((a,b)=>b[1]-a[1])
    .forEach((t,i)=>{
      full.innerHTML += `
        <div class="overlay-row">
          <div>${i+1}</div>
          <div>${t[0]}</div>
          <div>${t[1]} pts</div>
        </div>
      `;
    });
  document.getElementById("overlay").style.display = "flex";
}

function closeBoard() {
  document.getElementById("overlay").style.display = "none";
}

function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

renderTop4();
</script>

</body>
</html>
