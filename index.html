<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,215,0,0.12), transparent 35%),
    radial-gradient(circle at 85% 30%, rgba(255,180,0,0.10), transparent 40%),
    radial-gradient(circle at 50% 85%, rgba(255,215,0,0.08), transparent 45%);
  filter: blur(20px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,215,0,0.15);
  z-index: 1000;
}

.navbar h2 {
  color: #ffd700;
  letter-spacing: 2px;
  font-size: 20px;
}

/* MENU */
.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(15,15,15,0.95);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 14px;
  display: none;
  flex-direction: column;
}

.nav-links.active {
  display: flex;
}

.nav-links a {
  padding: 12px 14px;
  text-decoration: none;
  color: #ffd700;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px 70px;
}

.hero img {
  width: 280px;
  filter: drop-shadow(0 0 30px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 15px gold); }
  50% { filter: drop-shadow(0 0 45px gold); }
}

.hero h2 {
  margin-top: 22px;
  font-size: 44px;
  color: #ffd700;
}

.hero p {
  color: #bbb;
  margin-top: 10px;
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  max-width: 1100px;
  margin: auto;
}

.section h2 {
  text-align: center;
  color: #ffd700;
  margin-bottom: 25px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(20,20,20,0.7);
  border: 1px solid rgba(255,215,0,0.15);
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 30px rgba(255,215,0,0.25);
}

/* ================= FIXED ANIMATED WEEK BOX ================= */

.featured-box {
  background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(0,0,0,0.8));
  border: 1px solid rgba(255,215,0,0.35);
  padding: 28px;
  border-radius: 18px;
  text-align: center;
  position: relative;
  overflow: hidden;

  /* ENTRY FIX (VISIBLE NOW) */
  opacity: 0;
  transform: translateY(35px);

  animation:
    entry 1.1s ease forwards,
    floatBox 4s ease-in-out infinite 1.2s;
}

/* ENTRY ANIMATION */
@keyframes entry {
  0% {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    filter: blur(6px);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

/* FLOAT */
@keyframes floatBox {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* GLOW */
.featured-box::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,215,0,0.25), transparent 65%);
  animation: glowPulse 2.5s infinite;
  pointer-events: none;
}

@keyframes glowPulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 0.9; }
}

/* SHINE */
.featured-box::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 60%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,215,0,0.25), transparent);
  animation: shine 3.8s infinite;
  pointer-events: none;
}

@keyframes shine {
  0% { left: -120%; }
  60% { left: 120%; }
  100% { left: 120%; }
}

/* BUTTON */
.join-btn {
  display: inline-block;
  padding: 14px 30px;
  border: 2px solid #ffd700;
  color: #ffd700;
  border-radius: 12px;
  text-decoration: none;
  transition: 0.3s;
  font-weight: bold;
}

.join-btn:hover {
  background: #ffd700;
  color: black;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="navbar">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle">☰</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Hall of Fame</a>
    <a href="#">Schedule</a>
    <a href="#">Teams</a>
  </div>
</div>

<div class="hero">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<!-- MATCH OF THE WEEK -->
<div class="section">
  <h2>Match of the Week</h2>
  <div class="featured-box">
    Phantom vs Eclipse — Sunday 8PM EST
  </div>
</div>

<!-- PLAYER OF THE WEEK -->
<div class="section">
  <h2>Player of the Week</h2>
  <div class="featured-box">
    AceStorm — MVP Performance (38 Kills)
  </div>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Olympus</h2>
  <div class="cards">
    <div class="card">Competitive Play</div>
    <div class="card">Player Exposure</div>
  </div>
</div>

<!-- JOIN -->
<div class="section" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="#">Join Discord</a>
</div>

</body>
</html>
