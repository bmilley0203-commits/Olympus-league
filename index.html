<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
}

/* 🔥 GOLD ANIMATED BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle, #ffd70022, transparent 60%),
              radial-gradient(circle, #ffb70022, transparent 60%),
              #0a0a0a;
  animation: moveBg 15s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(10%, 10%); }
  100% { transform: translate(0,0); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;

  position: sticky;
  top: 0;
  z-index: 1000;

  backdrop-filter: blur(12px);
  background: rgba(20, 15, 0, 0.6);

  border-bottom: 1px solid rgba(255,215,0,0.2);
}

.menu-toggle {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* NAV LINKS */
.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  color: #ffd700;
  text-decoration: none;
  transition: 0.3s;
}

.nav-links a:hover {
  color: white;
}

/* MOBILE MENU */
@media(max-width: 768px) {
  .menu-toggle { display: block; }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 10px;

    background: rgba(30, 20, 0, 0.9);
    backdrop-filter: blur(12px);

    flex-direction: column;
    width: 200px;
    display: none;
    padding: 10px;

    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
  }

  .nav-links.active {
    display: flex;
  }
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero img {
  width: 180px;
  filter: drop-shadow(0 0 20px gold);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.hero h2 {
  font-size: 42px;
  color: #ffd700;
}

.hero p { color: #ccc; }

/* SECTIONS */
.section { padding: 40px 20px; }

.section h2 {
  color: #ffd700;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(20, 15, 0, 0.8);
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
  border: 1px solid rgba(255,215,0,0.2);
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
}

/* BUTTON */
.join-btn {
  border: 2px solid #ffd700;
  color: #ffd700;
  padding: 12px 25px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
  transition: 0.3s;
}

.join-btn:hover {
  background: #ffd700;
  color: black;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Olympus League</h2>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navMenu">
    <a href="index.html">Home</a>
    <a href="halloffame.html">Hall of Fame</a>
    <a href="schedule.html">Schedule/Results</a>
    <a href="teams.html">Teams</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<!-- INFO -->
<div class="section">
  <h2>About Olympus</h2>
  <div class="cards">
    <div class="card">Top Tier 3 Competition</div>
    <div class="card">Organized Leagues & Seasons</div>
    <div class="card">Exposure for Upcoming Talent</div>
  </div>
</div>

<!-- CTA -->
<div class="section">
  <h2>Join the League</h2>
  <a href="#" class="join-btn">Apply Now</a>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}
</script>

</body>
</html>
