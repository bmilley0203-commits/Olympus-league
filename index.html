<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* GLOBAL TEXT SYSTEM */
body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: #d6c27a;
  overflow-x: hidden;
  opacity: 0;
  animation: pageIn 1.2s ease forwards;
}

h2 {
  background: linear-gradient(90deg, #b8860b, #ffd700, #fff2a6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  color: rgba(214, 194, 122, 0.75);
}

@keyframes pageIn {
  to { opacity: 1; }
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,170,0,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,215,0,0.08), transparent 50%);
  filter: blur(22px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,215,0,0.22);
  z-index: 9999;
}

.navbar h2 {
  letter-spacing: 5px;
  font-weight: 900;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(255,215,0,0.25);
}

.nav-links a {
  transition: 0.2s;
}

.nav-links a:hover {
  text-shadow: 0 0 12px gold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 90px;
}

/* FEATURED BOX */
.featured-box {
  position: relative;
  background: linear-gradient(135deg, rgba(255,215,0,0.10), rgba(0,0,0,0.7));
  border-radius: 18px;
  padding: 26px;
  border: 1px solid rgba(255,215,0,0.25);
  overflow: hidden;
  transition: 0.4s ease;
}

/* animated glow border */
.featured-box::after {
  content: "";
  position: absolute;
  inset: -2px;
  background: conic-gradient(from 0deg, transparent, gold, transparent);
  animation: rotateGlow 6s linear infinite;
  z-index: -1;
  filter: blur(10px);
}

@keyframes rotateGlow {
  to { transform: rotate(360deg); }
}

/* scan line */
.featured-box::before {
  content: "";
  position: absolute;
  top: -100%;
  left: 0;
  width: 100%;
  height: 60%;
  background: linear-gradient(to bottom, transparent, rgba(255,215,0,0.15), transparent);
  animation: scan 4s infinite;
}

@keyframes scan {
  0% { top: -100%; }
  50% { top: 100%; }
  100% { top: 100%; }
}

/* LEADERBOARD */
.leaderboard {
  background: rgba(20,20,20,0.6);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255,215,0,0.2);
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,215,0,0.08);
  opacity: 0;
  transform: translateX(-20px);
  animation: rowIn 0.6s forwards;
}

@keyframes rowIn {
  to { opacity: 1; transform: translateX(0); }
}

/* BUTTON */
.join-btn, .show-btn {
  display: inline-block;
  padding: 14px 30px;
  border: 2px solid #ffd700;
  color: #ffd700;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 10px;
  background: transparent;
  font-weight: bold;
  transition: 0.25s;
}

.join-btn:active,
.show-btn:active {
  transform: scale(0.96);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
}

.overlay-content {
  background: rgba(20,20,20,0.95);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,215,0,0.25);
  width: 90%;
  max-width: 450px;
}

/* FLOAT */
.featured-box {
  animation: floatSoft 6s ease-in-out infinite;
}

@keyframes floatSoft {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* =========================
   MOBILE FIXES (ADDED ONLY)
========================= */
@media (max-width: 768px) {

  .hero {
    padding: 90px 15px 60px;
  }

  .hero img {
    width: 200px;
  }

  .featured-box {
    padding: 18px;
    font-size: 14px;
  }

  .navbar {
    padding: 14px 16px;
  }

  .nav-links {
    top: 60px;
    right: 10px;
    width: 180px;
    z-index: 9999;
  }

  .row {
    padding: 12px 10px;
    font-size: 14px;
  }

  .rank {
    width: 28px;
    height: 28px;
  }

  .team {
    font-size: 14px;
  }

  .points {
    font-size: 13px;
  }

  .show-btn, .join-btn {
    width: 100%;
    text-align: center;
  }
}

/* prevent mobile zoom issues */
html, body {
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}
</style>
</head>

<body>

<div class="navbar fade delay-1">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="#">Schedule</a>
    <a href="#">Teams</a>
  </div>
</div>

<div class="hero fade delay-1">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<div class="section fade delay-2">
  <h2>Match of the Week</h2>
  <div class="featured-box">Phantom vs Eclipse — Sunday 8PM EST</div>
</div>

<div class="section fade delay-2">
  <h2>Player of the Week</h2>
  <div class="featured-box">AceStorm — 38 Kills MVP Performance</div>
</div>

<div class="section fade delay-3">
  <h2>Standings</h2>
  <div class="leaderboard" id="leaderboard"></div>
</div>

<div class="section fade delay-4" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="https://discord.gg/2xsKgrESJ">Join Discord</a>
</div>

<script>
const teams = {
  Phantom: 12,
  Eclipse: 10,
  Nova: 9,
  Titan: 8
};

function renderTop4() {
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  Object.entries(teams)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,4)
    .forEach((t,i)=>{
      board.innerHTML += `
        <div class="row">
          <div class="rank">${i+1}</div>
          <div class="team">${t[0]}</div>
          <div class="points">${t[1]} pts</div>
        </div>
      `;
    });
}

function toggleMenu(){
  document.getElementById("navMenu").classList.toggle("active");
}

renderTop4();
</script>

</body>
</html>
