<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #070707;
  color: white;
  overflow-x: hidden;
}

/* ===== BACKGROUND (more premium layered glow) ===== */
body::before {
  content: "";
  position: fixed;
  inset: -60%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.14), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,180,0,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,215,0,0.08), transparent 50%);
  animation: bgFloat 20s ease-in-out infinite;
  z-index: -1;
}

@keyframes bgFloat {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(4%, 2%); }
}

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,215,0,0.15);
}

.navbar h2 {
  color: #ffd700;
  letter-spacing: 1px;
}

.menu-toggle {
  font-size: 26px;
  color: #ffd700;
  cursor: pointer;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  background: rgba(15,12,0,0.95);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 12px;
  width: 200px;
  display: none;
  flex-direction: column;
}

.nav-links a {
  padding: 12px;
  color: #ffd700;
  text-decoration: none;
  transition: 0.2s;
}

.nav-links a:hover {
  background: rgba(255,215,0,0.1);
}

.nav-links.active { display: flex; }

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 110px 20px 70px;
}

.logo-wrapper {
  position: relative;
  display: inline-block;
}

/* glowing ring */
.logo-wrapper::before {
  content: "";
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  border: 2px solid rgba(255,215,0,0.25);
  animation: spin 8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hero img {
  width: 270px;
  filter: drop-shadow(0 0 25px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 15px gold); }
  50% { filter: drop-shadow(0 0 45px gold); }
}

.hero h1 {
  font-size: 44px;
  color: #ffd700;
  margin-top: 20px;
  letter-spacing: 1px;
}

.hero p {
  color: #cfcfcf;
  margin-top: 10px;
  font-size: 16px;
}

/* ===== QUICK INFO STRIP ===== */
.info-strip {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 35px;
  flex-wrap: wrap;
}

.info-box {
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.15);
  padding: 12px 18px;
  border-radius: 10px;
  color: #ffd700;
  font-size: 14px;
}

/* ===== SECTION BASE ===== */
.section {
  max-width: 1000px;
  margin: auto;
  padding: 70px 20px;
}

.section h2 {
  text-align: center;
  color: #ffd700;
  font-size: 28px;
  margin-bottom: 25px;
}

/* ===== FEATURE CARDS ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
}

.card {
  background: rgba(20,15,0,0.75);
  border: 1px solid rgba(255,215,0,0.15);
  padding: 20px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 30px rgba(255,215,0,0.25);
}

/* ===== CTA ===== */
.cta {
  text-align: center;
  padding: 60px 20px;
}

.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 10px;
  border: 2px solid #ffd700;
  color: #ffd700;
  text-decoration: none;
  transition: 0.25s;
}

.btn:hover {
  background: #ffd700;
  color: black;
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
}

.overlay-content {
  background: rgba(25,18,0,0.92);
  padding: 26px;
  border-radius: 18px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.2);
}

.overlay-content h2 {
  color: #ffd700;
}

.overlay-content p {
  color: #ccc;
  margin-top: 10px;
}

.close-btn {
  margin-top: 16px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #ffd700;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Olympus League</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="roster.html">Roster</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="schedule.html">Schedule</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="logo-wrapper">
    <img src="logo.png">
  </div>
  <h1>Olympus League</h1>
  <p>Elite Tier 3 Rainbow Six Siege Competition</p>

  <div class="info-strip">
    <div class="info-box">🔥 Competitive Tier 3 League</div>
    <div class="info-box">📺 Weekly Matches</div>
    <div class="info-box">🏆 Rising Talent Focus</div>
  </div>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>What We Are</h2>
  <div class="cards">
    <div class="card" onclick="openOverlay('Competition','Structured Tier 3 competitive environment built for serious teams.')">
      Competitive Integrity
    </div>

    <div class="card" onclick="openOverlay('Growth','We highlight rising players through matches and content.')">
      Player Growth
    </div>

    <div class="card" onclick="openOverlay('Exposure','Streamed matches and recognition opportunities.')">
      Esports Exposure
    </div>
  </div>
</div>

<!-- JOIN -->
<div class="cta">
  <h2 style="color:#ffd700; margin-bottom:15px;">Join Olympus</h2>
  <a class="btn" href="https://discord.gg/Butq7VhNx" target="_blank">
    Join Discord
  </a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

function openOverlay(title, text) {
  document.getElementById("overlayTitle").innerText = title;
  document.getElementById("overlayText").innerText = text;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
