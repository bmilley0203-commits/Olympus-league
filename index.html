<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  color: white;
  background: #0a0a0a;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: -50%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,180,0,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,215,0,0.08), transparent 50%);
  animation: bgMove 18s ease-in-out infinite;
  z-index: -1;
}

@keyframes bgMove {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(3%, 2%); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  position: sticky;
  top: 0;
  backdrop-filter: blur(12px);
  background: rgba(15, 12, 0, 0.7);
  border-bottom: 1px solid rgba(255,215,0,0.15);
  z-index: 1000;
}

.navbar h2 {
  color: #ffd700;
  letter-spacing: 1px;
}

.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  background: rgba(20,15,0,0.95);
  width: 200px;
  display: none;
  flex-direction: column;
  border-radius: 12px;
  border: 1px solid rgba(255,215,0,0.2);
}

.nav-links a {
  padding: 12px;
  text-decoration: none;
  color: #ffd700;
  transition: 0.2s;
}

.nav-links a:hover {
  background: rgba(255,215,0,0.1);
}

.nav-links.active { display: flex; }

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px 60px;
}

.logo-wrapper {
  position: relative;
  display: inline-block;
}

/* spinning ring */
.logo-wrapper::before {
  content: "";
  position: absolute;
  inset: -25px;
  border-radius: 50%;
  border: 2px solid rgba(255,215,0,0.25);
  animation: spin 7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hero img {
  width: 260px;
  filter: drop-shadow(0 0 25px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s ease-in-out infinite;
}

/* animations */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 15px gold); }
  50% { filter: drop-shadow(0 0 40px gold); }
}

.hero h2 {
  margin-top: 20px;
  font-size: 40px;
  color: #ffd700;
}

.hero p {
  color: #ccc;
  margin-top: 10px;
}

/* SECTIONS */
.section {
  padding: 50px 20px;
  max-width: 1000px;
  margin: auto;
}

.section h2 {
  color: #ffd700;
  margin-bottom: 20px;
  text-align: center;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
}

.card {
  background: rgba(20,15,0,0.75);
  border: 1px solid rgba(255,215,0,0.15);
  padding: 18px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px rgba(255,215,0,0.3);
}

/* BUTTON */
.join-btn {
  display: inline-block;
  padding: 12px 26px;
  border: 2px solid #ffd700;
  color: #ffd700;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.25s;
}

.join-btn:hover {
  background: #ffd700;
  color: black;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
}

.overlay-content {
  background: rgba(25,18,0,0.9);
  padding: 26px;
  border-radius: 18px;
  border: 1px solid rgba(255,215,0,0.2);
  width: 90%;
  max-width: 360px;
  text-align: center;
}

.overlay-content h2 {
  color: #ffd700;
}

.overlay-content p {
  color: #ccc;
  margin-top: 10px;
}

.close-btn {
  margin-top: 15px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #ffd700;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Olympus League</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="#">Hall of Fame</a>
    <a href="#">Schedule</a>
    <a href="#">Teams</a>
  </div>
</div>

<div class="hero">
  <div class="logo-wrapper">
    <img src="logo.png">
  </div>
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<div class="section">
  <h2>About Olympus</h2>
  <div class="cards">
    <div class="card" onclick="openOverlay('Competition','High-level structured Tier 3 Rainbow Six Siege competition.')">
      Competitive Play
    </div>
    <div class="card" onclick="openOverlay('Exposure','Players gain recognition through matches and highlights.')">
      Player Exposure
    </div>
  </div>
</div>

<div class="section" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="https://discord.gg/Butq7VhNx" target="_blank">Join Discord</a>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

function openOverlay(title, text) {
  document.getElementById("overlayTitle").innerText = title;
  document.getElementById("overlayText").innerText = text;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
