<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus Teams</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: white;
}

/* ================= NAVBAR (MATCH HALL OF FAME EXACTLY) ================= */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,215,0,0.22);
  z-index: 9999;
  height: 70px;
}

/* OLYMPUS GOLD TEXT */
.navbar h2 {
  font-size: 22px;
  letter-spacing: 5px;
  font-weight: 900;
  text-transform: uppercase;

  background: linear-gradient(90deg,#b8860b,#ffd700,#fff2a6,#ffd700,#b8860b);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: goldShine 4s linear infinite;
}

@keyframes goldShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* MENU */
.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
  line-height: 1;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(15,15,15,0.95);
  border-radius: 14px;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

.nav-links.active {
  display: flex;
}

.nav-links a {
  padding: 12px;
  color: #ffd700;
  text-decoration: none;
}

.nav-links a:hover {
  background: rgba(255,215,0,0.08);
}

/* HEADER */
header {
  text-align: center;
  padding: 60px 20px 30px;
}

header h1 {
  font-size: 48px;
  letter-spacing: 4px;

  background: linear-gradient(90deg,#b8860b,#ffd700,#fff2a6,#ffd700,#b8860b);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: goldShine 4s linear infinite;
}

header p {
  color: #bbb;
  margin-top: 10px;
}

/* GRID */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
}

/* TEAM CARD */
.team-card {
  background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(0,0,0,0.7));
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 16px;
  padding: 25px;
  text-align: center;
  transition: 0.3s ease;
}

.team-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 30px rgba(255,215,0,0.25);
}

.team-card img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 10px rgba(255,215,0,0.4));
}

.team-card h2 {
  font-size: 18px;
  color: #ffd700;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navMenu">
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <a href="teams.html">Teams</a>
    <a href="fame.html">Hall of Fame</a>
  </div>
</div>

<header>
  <h1>TEAMS</h1>
  <p>Olympus League Rosters</p>
</header>

<div class="container">

  <div class="team-card">
    <img src="logo.png">
    <h2>PHANTOM</h2>
  </div>

  <div class="team-card">
    <img src="logo.png">
    <h2>ECLIPSE</h2>
  </div>

  <div class="team-card">
    <img src="logo.png">
    <h2>NOVA</h2>
  </div>

  <div class="team-card">
    <img src="logo.png">
    <h2>TITAN</h2>
  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}
</script>

</body>
</html>
