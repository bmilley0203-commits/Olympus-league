<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: white;
  overflow-x: hidden;
  opacity: 0;
  animation: pageIn 1.2s ease forwards;
}

@keyframes pageIn {
  to { opacity: 1; }
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,170,0,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,215,0,0.08), transparent 50%);
  filter: blur(22px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,215,0,0.15);
}

.navbar h2 { color: #ffd700; }

.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(15,15,15,0.95);
  border-radius: 14px;
  display: none;
  flex-direction: column;
}

.nav-links.active { display: flex; }

.nav-links a {
  padding: 12px;
  color: #ffd700;
  text-decoration: none;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(25px);
  animation: fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.delay-1 { animation-delay: 0.2s; }
.delay-2 { animation-delay: 0.5s; }
.delay-3 { animation-delay: 0.8s; }
.delay-4 { animation-delay: 1.1s; }

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px;
}

.hero img {
  width: 280px;
  filter: drop-shadow(0 0 30px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s infinite;
}

@keyframes float {
  50% { transform: translateY(-10px); }
}

@keyframes glow {
  50% { filter: drop-shadow(0 0 50px gold); }
}

.hero h2 {
  font-size: 44px;
  color: #ffd700;
}

.hero p {
  color: #bbb;
}

/* SECTION */
.section {
  padding: 60px 20px;
  max-width: 1100px;
  margin: auto;
}

.section h2 {
  text-align: center;
  color: #ffd700;
  margin-bottom: 25px;
}

/* LEADERBOARD */
.leaderboard {
  background: rgba(20,20,20,0.6);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255,215,0,0.2);
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,215,0,0.08);
}

.row:hover {
  background: rgba(255,215,0,0.06);
}

.rank { color: #ffd700; width: 30px; }
.team { flex: 1; }
.points { color: #ccc; }

/* ================= BUTTON FIX (HERE) ================= */

.join-btn, .show-btn {
  display: inline-block;
  padding: 14px 30px;
  border: 2px solid #ffd700;
  color: #ffd700;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 10px;
  background: transparent;

  /* FIXES FOR WHITE BUTTON ISSUE */
  appearance: none;
  -webkit-appearance: none;
  outline: none;

  font-weight: bold;
  transition: 0.25s ease;
}

.show-btn {
  background: transparent !important;
  color: #ffd700 !important;
}

.join-btn:hover, .show-btn:hover {
  background: #ffd700;
  color: black;
  transform: scale(1.05);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
}

.overlay-content {
  background: rgba(20,20,20,0.95);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,215,0,0.25);
  width: 90%;
  max-width: 450px;
  max-height: 70vh;
  overflow-y: auto;
}

.overlay-row {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid rgba(255,215,0,0.1);
}

.close-btn {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #ffd700;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar fade delay-1">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="#">Schedule</a>
    <a href="#">Teams</a>
  </div>
</div>

<!-- HERO -->
<div class="hero fade delay-1">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<!-- LEADERBOARD -->
<div class="section fade delay-2">
  <h2>Standings</h2>
  <div class="leaderboard" id="leaderboard"></div>
  <div style="text-align:center;">
    <button class="show-btn" onclick="openBoard()">Show Full Standings</button>
  </div>
</div>

<!-- JOIN -->
<div class="section fade delay-3" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="https://discord.gg/Butq7VhNx">Join Discord</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 style="color:#ffd700;">Full Standings</h2>
    <div id="fullBoard"></div>
    <button class="close-btn" onclick="closeBoard()">Close</button>
  </div>
</div>

<script>
const teams = {
  Phantom: 12,
  Eclipse: 10,
  Nova: 9,
  Titan: 8,
  Orion: 7,
  Vortex: 6,
  Apex: 5,
  Zenith: 4,
  Hydra: 3,
  Ghost: 2,
  Ember: 1,
  Surge: 0
};

function renderTop4() {
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  Object.entries(teams)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,4)
    .forEach((t,i)=>{
      board.innerHTML += `
        <div class="row">
          <div class="rank">${i+1}</div>
          <div class="team">${t[0]}</div>
          <div class="points">${t[1]} pts</div>
        </div>
      `;
    });
}

function openBoard() {
  const full = document.getElementById("fullBoard");
  full.innerHTML = "";

  Object.entries(teams)
    .sort((a,b)=>b[1]-a[1])
    .forEach((t,i)=>{
      full.innerHTML += `
        <div class="overlay-row">
          <div>${i+1}</div>
          <div>${t[0]}</div>
          <div>${t[1]} pts</div>
        </div>
      `;
    });

  document.getElementById("overlay").style.display = "flex";
}

function closeBoard() {
  document.getElementById("overlay").style.display = "none";
}

function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

renderTop4();
</script>

</body>
</html>
