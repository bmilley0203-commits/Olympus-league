<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* subtle background only */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 20%, rgba(255,215,0,0.08), transparent 50%);
  z-index: -1;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 18px 24px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,215,0,0.12);
}

.navbar h2 {
  color: #ffd700;
  font-size: 18px;
  letter-spacing: 1px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 80px;
}

.hero img {
  width: 220px;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.25));
}

.hero h1 {
  margin-top: 20px;
  font-size: 42px;
  color: #ffd700;
}

.hero p {
  margin-top: 10px;
  color: #bdbdbd;
}

/* CTA BUTTON */
.btn {
  margin-top: 25px;
  display: inline-block;
  padding: 12px 24px;
  border: 1px solid #ffd700;
  color: #ffd700;
  text-decoration: none;
  transition: 0.2s;
}

.btn:hover {
  background: #ffd700;
  color: black;
}

/* SECTION */
.section {
  max-width: 900px;
  margin: auto;
  padding: 60px 20px;
}

.section h2 {
  color: #ffd700;
  margin-bottom: 20px;
  font-size: 20px;
}

/* CARDS (minimal clean look) */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,215,0,0.1);
  padding: 18px;
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  border-color: rgba(255,215,0,0.4);
  transform: translateY(-3px);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
}

.overlay-content {
  background: #111;
  padding: 24px;
  border: 1px solid rgba(255,215,0,0.2);
  width: 90%;
  max-width: 350px;
  text-align: center;
}

.overlay-content h2 {
  color: #ffd700;
}

.overlay-content p {
  color: #ccc;
  margin-top: 10px;
}

.close-btn {
  margin-top: 15px;
  padding: 10px;
  background: #ffd700;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>OLYMPUS LEAGUE</h2>
</div>

<div class="hero">
  <img src="logo.png">
  <h1>Olympus League</h1>
  <p>Tier 3 Competitive Rainbow Six Siege</p>

  <a class="btn" href="https://discord.gg/Butq7VhNx">Join Discord</a>
</div>

<div class="section">
  <h2>ABOUT</h2>
  <div class="cards">
    <div class="card" onclick="openOverlay('Competition','Structured Tier 3 competitive league.')">Competitive Play</div>
    <div class="card" onclick="openOverlay('Growth','Helping players improve and get noticed.')">Player Growth</div>
    <div class="card" onclick="openOverlay('Exposure','Streamed matches and recognition.')">Exposure</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 id="title"></h2>
    <p id="text"></p>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
function openOverlay(t, x){
  document.getElementById("title").innerText = t;
  document.getElementById("text").innerText = x;
  document.getElementById("overlay").style.display = "flex";
}
function closeOverlay(){
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
