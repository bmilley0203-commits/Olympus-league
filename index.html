<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,215,0,0.12), transparent 35%),
    radial-gradient(circle at 85% 30%, rgba(255,180,0,0.10), transparent 40%),
    radial-gradient(circle at 50% 85%, rgba(255,215,0,0.08), transparent 45%);
  filter: blur(20px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,215,0,0.15);
  z-index: 1000;
}

.navbar h2 {
  color: #ffd700;
  letter-spacing: 2px;
  font-size: 20px;
}

/* MENU */
.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(15,15,15,0.95);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 14px;
  display: none;
  flex-direction: column;
}

.nav-links.active {
  display: flex;
}

.nav-links a {
  padding: 12px 14px;
  text-decoration: none;
  color: #ffd700;
}

/* ================= INTRO SYSTEM ================= */

.fade-in {
  opacity: 0;
  transform: translateY(25px);
  animation: fadeIn 2.2s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.delay-1 { animation-delay: 0.4s; }
.delay-2 { animation-delay: 0.8s; }
.delay-3 { animation-delay: 1.2s; }

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px 70px;
}

.logo-wrapper {
  position: relative;
  display: inline-block;
}

/* spinning ring */
.logo-wrapper::before {
  content: "";
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  border: 2px solid rgba(255,215,0,0.25);
  animation: spin 8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* logo animation */
.hero img {
  width: 280px;
  filter: drop-shadow(0 0 30px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 15px gold); }
  50% { filter: drop-shadow(0 0 45px gold); }
}

.hero h2 {
  margin-top: 22px;
  font-size: 44px;
  color: #ffd700;
}

.hero p {
  color: #bbb;
  margin-top: 10px;
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  max-width: 1100px;
  margin: auto;
}

.section h2 {
  text-align: center;
  color: #ffd700;
  margin-bottom: 25px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(20,20,20,0.7);
  border: 1px solid rgba(255,215,0,0.15);
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 30px rgba(255,215,0,0.25);
}

/* MATCH OF THE WEEK */
.featured {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.6));
  border: 1px solid rgba(255,215,0,0.25);
  padding: 25px;
  border-radius: 18px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: pulseGlow 3s infinite;
}

@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 0 rgba(255,215,0,0.0); }
  50% { box-shadow: 0 0 35px rgba(255,215,0,0.25); }
}

.featured h3 {
  color: #ffd700;
  margin-bottom: 10px;
}

.featured p {
  color: #ccc;
}

/* BUTTON */
.join-btn {
  display: inline-block;
  padding: 14px 30px;
  border: 2px solid #ffd700;
  color: #ffd700;
  border-radius: 12px;
  text-decoration: none;
  transition: 0.3s;
  font-weight: bold;
}

.join-btn:hover {
  background: #ffd700;
  color: black;
  transform: scale(1.05);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
}

.overlay-content {
  background: rgba(20,20,20,0.95);
  padding: 28px;
  border-radius: 18px;
  border: 1px solid rgba(255,215,0,0.25);
  width: 90%;
  max-width: 380px;
  text-align: center;
}

.overlay-content h2 {
  color: #ffd700;
}

.overlay-content p {
  color: #ccc;
  margin-top: 12px;
}

.close-btn {
  margin-top: 18px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #ffd700;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="#">Hall of Fame</a>
    <a href="#">Schedule</a>
    <a href="#">Teams</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="logo-wrapper fade-in">
    <img src="logo.png">
  </div>

  <h2 class="fade-in delay-1">Olympus R6 League</h2>
  <p class="fade-in delay-2">Where Tier 3 talent rises to the top.</p>
</div>

<!-- MATCH OF THE WEEK -->
<div class="section fade-in delay-3">
  <h2>Match of the Week</h2>

  <div class="featured">
    <h3>Phantom vs Eclipse</h3>
    <p>Sunday 8PM EST — Streamed Live</p>
    <p>High-stakes matchup for playoff positioning</p>
  </div>
</div>

<!-- ABOUT -->
<div class="section fade-in delay-3">
  <h2>About Olympus</h2>

  <div class="cards">
    <div class="card" onclick="openOverlay('Competitive Integrity','Structured Tier 3 Rainbow Six Siege competition built for rising talent.')">
      Competitive Play
    </div>

    <div class="card" onclick="openOverlay('Exposure System','Players gain recognition through stats, highlights, and scouting.')">
      Player Exposure
    </div>
  </div>
</div>

<!-- JOIN -->
<div class="section fade-in delay-3" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="https://discord.gg/Butq7VhNx" target="_blank">Join Discord</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

function openOverlay(title, text) {
  document.getElementById("overlayTitle").innerText = title;
  document.getElementById("overlayText").innerText = text;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
