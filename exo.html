<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0a0f14, #05070a);
  color: white;
  overflow-x: hidden;
  opacity: 0;
  animation: pageIn 1.2s ease forwards;
}

@keyframes pageIn {
  to { opacity: 1; }
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,234,255,0.12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,200,255,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(0,234,255,0.08), transparent 50%);
  filter: blur(22px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(8,12,16,0.95);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(0,234,255,0.3);
  z-index: 9999;
}

/* LOGO TEXT */
.navbar h2 {
  font-size: 22px;
  letter-spacing: 5px;
  font-weight: 900;
  text-transform: uppercase;

  background: linear-gradient(90deg,#00eaff,#ffffff,#00eaff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 4s linear infinite, intro 1.2s ease forwards;
  opacity: 0;

  text-shadow: 0 0 12px rgba(0,234,255,0.3);
}

/* GLOBAL HEADERS */
h1, h2 {
  background: linear-gradient(90deg,#00eaff,#ffffff,#00eaff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 4s linear infinite;
  font-weight: 900;
}

@keyframes shine {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

@keyframes intro {
  0% { opacity: 0; transform: translateY(-10px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* NAV LINKS */
.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #00eaff;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(10,15,20,0.95);
  border-radius: 14px;
  display: none;
  flex-direction: column;
  border: 1px solid rgba(0,234,255,0.3);
}

.nav-links.active { display: flex; }

.nav-links a {
  padding: 12px;
  color: #00eaff;
  text-decoration: none;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(25px);
  animation: fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.delay-1 { animation-delay: 0.2s; }
.delay-2 { animation-delay: 0.5s; }
.delay-3 { animation-delay: 0.8s; }
.delay-4 { animation-delay: 1.1s; }

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 90px;
}

.hero img {
  width: 280px;
  filter: drop-shadow(0 0 30px #00eaff);
  animation: float 3s ease-in-out infinite, glow 2.5s infinite;
}

@keyframes float {
  50% { transform: translateY(-10px); }
}

@keyframes glow {
  50% { filter: drop-shadow(0 0 55px #00eaff); }
}

/* TEXT */
.hero p {
  color: #9aa6ad;
}

/* SECTION */
.section {
  padding: 60px 20px;
  max-width: 1100px;
  margin: auto;
}

/* FEATURE BOX */
.featured-box {
  background: linear-gradient(135deg, rgba(0,234,255,0.12), rgba(0,0,0,0.7));
  border: 1px solid rgba(0,234,255,0.25);
  padding: 24px;
  border-radius: 18px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: 0.4s ease;
}

/* SHIMMER */
@keyframes blueSweep {
  0% { left: -120%; }
  50% { left: 120%; }
  100% { left: 120%; }
}

/* LEADERBOARD */
.leaderboard {
  background: rgba(20,20,20,0.6);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(0,234,255,0.2);
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(0,234,255,0.08);
}

.row:hover {
  background: rgba(0,234,255,0.06);
}

.rank { color: #00eaff; width: 30px; }
.points { color: #9aa6ad; }

/* BUTTONS */
.join-btn, .show-btn {
  display: inline-block;
  padding: 14px 30px;
  border: 2px solid #00eaff;
  color: #00eaff;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 10px;
  background: transparent;
  font-weight: bold;
  transition: 0.25s;
}

.join-btn:hover, .show-btn:hover {
  background: #00eaff;
  color: black;
  transform: scale(1.05);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
}

.overlay-content {
  background: rgba(15,20,25,0.95);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(0,234,255,0.25);
  width: 90%;
  max-width: 450px;
  max-height: 70vh;
  overflow-y: auto;
}

.overlay-row {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid rgba(0,234,255,0.1);
}

.close-btn {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #00eaff;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar fade delay-1">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navMenu">
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <a href="teams.html">Teams</a>
    <a href="fame.html">Hall Fame</a>
  </div>
</div>

<div class="hero fade delay-1">
  <img src="logo.png">
  <h2>Olympus R6 League</h2>
  <p>Where Tier 3 talent rises to the top.</p>
</div>

<div class="section fade delay-2">
  <h2>Match of the Week</h2>
  <div class="featured-box">
    <div style="position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(0,234,255,0.35),transparent);transform:skewX(-20deg);animation:blueSweep 3s linear infinite;"></div>
    Phantom vs Eclipse — Sunday 8PM EST
  </div>
</div>

<div class="section fade delay-2">
  <h2>Player of the Week</h2>
  <div class="featured-box">
    <div style="position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(0,234,255,0.35),transparent);transform:skewX(-20deg);animation:blueSweep 3s linear infinite;"></div>
    AceStorm — 20 Kills MVP Performance
  </div>
</div>

<div class="section fade delay-3">
  <h2>Standings</h2>
  <div class="leaderboard" id="leaderboard"></div>
  <div style="text-align:center;">
    <button class="show-btn" onclick="openBoard()">Show Full Standings</button>
  </div>
</div>

<div class="section fade delay-4" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="https://discord.gg/2xsKgrESJ">Join Discord</a>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2>Full Standings</h2>
    <div id="fullBoard"></div>
    <button class="close-btn" onclick="closeBoard()">Close</button>
  </div>
</div>

<script>
const teams = {
  "Team Silenced": 0,
  "Nitemare Esports": 0,
  "Nightmare Fuel": 0,
  "Hipfire Esports": 0,
  "Calico & Co.": 0,
  "Atlantis Esports": 0,
  "Lunar S1": 0,
  "Solaris Esports": 0,
  "Left Lane": 0,
  "Lunar Void": 0,
  "Corsa Supreme": 0,
  "Azalea Esports": 0,
  "Yellow Jackets": 0,
  "5 Sins": 0,
  "sTx Zenith": 0,
  "Outcast": 0,
  "Highcaliber": 0,
  "Infinite Esports": 0,
  "Lunar Academy": 0,
  "Landlocked Esports": 0,
  "Castaways Comp": 0,
  "Castaways Dev": 0,
  "Team Tide": 0,
  "Ridiculous Gaming": 0
};

function renderTop4() {
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";
  Object.entries(teams).sort((a,b)=>b[1]-a[1]).slice(0,4)
    .forEach((t,i)=>{
      board.innerHTML += `
        <div class="row">
          <div class="rank">${i+1}</div>
          <div class="team">${t[0]}</div>
          <div class="points">${t[1]} pts</div>
        </div>
      `;
    });
}

function openBoard() {
  const full = document.getElementById("fullBoard");
  full.innerHTML = "";
  Object.entries(teams).sort((a,b)=>b[1]-a[1]).forEach((t,i)=>{
    full.innerHTML += `
      <div class="overlay-row">
        <div>${i+1}</div>
        <div>${t[0]}</div>
        <div>${t[1]} pts</div>
      </div>
    `;
  });
  document.getElementById("overlay").style.display = "flex";
}

function closeBoard() {
  document.getElementById("overlay").style.display = "none";
}

function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

window.addEventListener("load", renderTop4);
</script>

</body>
</html>
