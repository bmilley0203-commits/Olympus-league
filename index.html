<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus League</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0d0d0d, #050505);
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,215,0,0.12), transparent 35%),
    radial-gradient(circle at 85% 30%, rgba(255,180,0,0.10), transparent 40%),
    radial-gradient(circle at 50% 85%, rgba(255,215,0,0.08), transparent 45%);
  filter: blur(20px);
  animation: floatBg 12s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(2%, -2%); }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 26px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,215,0,0.15);
  z-index: 1000;
}

.navbar h2 { color: #ffd700; }

.menu-toggle {
  font-size: 26px;
  cursor: pointer;
  color: #ffd700;
}

.nav-links {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 210px;
  background: rgba(15,15,15,0.95);
  border-radius: 14px;
  display: none;
  flex-direction: column;
}

.nav-links.active { display: flex; }

.nav-links a {
  padding: 12px;
  color: #ffd700;
  text-decoration: none;
}

/* FADE IN */
.fade-in {
  opacity: 0;
  transform: translateY(25px);
  animation: fadeIn 1.6s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

.delay-1 { animation-delay: 0.3s; }
.delay-2 { animation-delay: 0.6s; }
.delay-3 { animation-delay: 0.9s; }

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px 40px;
}

.hero img {
  width: 280px;
  filter: drop-shadow(0 0 30px gold);
  animation: float 3s ease-in-out infinite, glow 2.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 15px gold); }
  50% { filter: drop-shadow(0 0 45px gold); }
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  max-width: 1100px;
  margin: auto;
}

.section h2 {
  text-align: center;
  color: #ffd700;
  margin-bottom: 20px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(20,20,20,0.7);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid rgba(255,215,0,0.15);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 25px rgba(255,215,0,0.25);
}

/* =======================
   🔥 BETTER WEEK ANIMATIONS
======================= */

/* MATCH OF THE WEEK (strong glow + pulse) */
.match-week {
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(0,0,0,0.85));
  border: 1px solid rgba(255,215,0,0.35);
  padding: 25px;
  border-radius: 18px;
  text-align: center;
  animation: matchPulse 2.8s infinite;
  position: relative;
  overflow: hidden;
}

@keyframes matchPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,215,0,0.15); }
  50% { transform: scale(1.03); box-shadow: 0 0 40px rgba(255,215,0,0.35); }
}

/* PLAYER OF THE WEEK (different style = energy glow) */
.player-week {
  background: linear-gradient(135deg, rgba(0,150,255,0.12), rgba(0,0,0,0.85));
  border: 1px solid rgba(0,150,255,0.35);
  padding: 25px;
  border-radius: 18px;
  text-align: center;
  animation: playerFloat 3.2s infinite ease-in-out;
}

@keyframes playerFloat {
  0%,100% { transform: translateY(0); box-shadow: 0 0 10px rgba(0,150,255,0.15); }
  50% { transform: translateY(-10px); box-shadow: 0 0 35px rgba(0,150,255,0.35); }
}

/* OVERLAY (ABOUT US FIXED BACK) */
.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
}

.overlay-content {
  background: rgba(20,20,20,0.95);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,215,0,0.25);
  width: 90%;
  max-width: 380px;
  text-align: center;
}

.close-btn {
  margin-top: 15px;
  padding: 10px 18px;
  background: #ffd700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* LEADERBOARD */
.leaderboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 15px;
}

.team {
  background: rgba(20,20,20,0.7);
  padding: 15px;
  border-radius: 14px;
  border: 1px solid rgba(255,215,0,0.15);
}
</style>
</head>

<body>

<div class="navbar fade-in">
  <h2>OLYMPUS</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navMenu">
    <a href="#">Home</a>
    <a href="#">Teams</a>
    <a href="#">Schedule</a>
    <a href="#">Hall of Fame</a>
  </div>
</div>

<!-- HERO -->
<div class="hero fade-in delay-1">
  <img src="logo.png">
</div>

<!-- MATCH OF THE WEEK -->
<div class="section fade-in delay-2">
  <h2>Match of the Week</h2>
  <div class="match-week">
    Phantom vs Eclipse
  </div>
</div>

<!-- PLAYER OF THE WEEK -->
<div class="section fade-in delay-2">
  <h2>Player of the Week</h2>
  <div class="player-week">
    AceStorm — MVP Performance
  </div>
</div>

<!-- LEADERBOARD -->
<div class="section fade-in delay-3">
  <h2>Leaderboard</h2>
  <div class="leaderboard">
    <div class="team">1. Phantom — 18 pts</div>
    <div class="team">2. Eclipse — 16 pts</div>
    <div class="team">3. Nova — 15 pts</div>
    <div class="team">4. Apex — 14 pts</div>
  </div>
</div>

<!-- ABOUT (OVERLAYS BACK) -->
<div class="section fade-in delay-3">
  <h2>About Olympus</h2>

  <div class="cards">
    <div class="card" onclick="openOverlay('Competitive Play','Structured Tier 3 Rainbow Six Siege competition focused on disciplined gameplay, fair rules, and improving rising teams.')">
      Competitive Play
    </div>

    <div class="card" onclick="openOverlay('Team Exposure','Teams gain visibility through streamed matches, stats tracking, and featured spotlight coverage.')">
      Team Exposure
    </div>
  </div>
</div>

<!-- JOIN -->
<div class="section fade-in delay-3" style="text-align:center;">
  <h2>Join Olympus</h2>
  <a class="join-btn" href="#">Join Discord</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
    <button class="close-btn" onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

function openOverlay(title, text) {
  document.getElementById("overlayTitle").innerText = title;
  document.getElementById("overlayText").innerText = text;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
